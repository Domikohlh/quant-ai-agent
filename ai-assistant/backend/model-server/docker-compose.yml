version: '3.8'

services:
  model-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=openai/gpt-oss-20b
      - DEVICE=cuda
      - API_KEY=${API_KEY}
    volumes:
      - ./model_cache:/app/model_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
